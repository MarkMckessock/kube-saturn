---
apiVersion: v1
kind: Pod
metadata:
  name: test-pvc
  namespace: default
spec:
  containers:
    - name: test-pod
      image: ubuntu
      command:
        [
          "/bin/bash",
          "-c",
          "apt update && apt install -y wget rsync tmux nano && sleep 3600",
        ]
      volumeMounts:
        - mountPath: /data
          name: data
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: ftb-revelations
  restartPolicy: Never
