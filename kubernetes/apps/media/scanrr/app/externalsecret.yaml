---
# yaml-language-server: $schema=https://k8s-schemas.bjw-s.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scanrr-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: scanrr-config-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # The whole scanrr config is rendered here (jobs/settings are literal;
        # only the *_api_key / pushover_* values come from 1Password — pulled
        # per-field below from the existing per-instance items). scanrr reads
        # this file at SCANRR_CONFIG_FILE (read-only).
        scanrr.yaml: |
          # Sonarr / Radarr instances (referenced by name from arr-type jobs).
          # arr apps mount granite at /media and basalt at /basalt/media; scanrr
          # mounts granite at /granite/media — hence the /media -> /granite/media map.
          radarr:
            - name: radarr
              url: http://radarr.media.svc.cluster.local
              api_key: "{{ .radarr_api_key }}"
              mappings:
                - { from: /media, to: /granite/media }
                - { from: /basalt/media, to: /basalt/media }
            - name: radarr-4k
              url: http://radarr-4k.media.svc.cluster.local
              api_key: "{{ .radarr_4k_api_key }}"
              mappings:
                - { from: /media, to: /granite/media }
                - { from: /basalt/media, to: /basalt/media }
          sonarr:
            - name: sonarr
              url: http://sonarr.media.svc.cluster.local
              api_key: "{{ .sonarr_api_key }}"
              mappings:
                - { from: /media, to: /granite/media }
                - { from: /basalt/media, to: /basalt/media }
            - name: sonarr-4k
              url: http://sonarr-4k.media.svc.cluster.local
              api_key: "{{ .sonarr_4k_api_key }}"
              mappings:
                - { from: /media, to: /granite/media }
                - { from: /basalt/media, to: /basalt/media }

          pushover:
            user_key: "{{ .pushover_user }}"
            api_token: "{{ .pushover_token }}"
            events: [corrupt_found, scan_completed, replacement_completed]

          # One job per arr instance — discovery enumerates each arr's library,
          # maps arr paths to the read-only mounts, scans, and links detections back
          # to the arr file (enabling remediation). auto_replace is OFF for initial
          # testing — nothing is deleted; flip it per job once verified.
          jobs:
            - name: Radarr
              type: arr
              arr_instance: radarr
              ttl_days: 30
              schedule_cron: "0 3 * * *"
            - name: Radarr 4K
              type: arr
              arr_instance: radarr-4k
              ttl_days: 30
              schedule_cron: "0 4 * * *"
            - name: Sonarr
              type: arr
              arr_instance: sonarr
              ttl_days: 30
              schedule_cron: "0 5 * * *"
            - name: Sonarr 4K
              type: arr
              arr_instance: sonarr-4k
              ttl_days: 30
              schedule_cron: "0 6 * * *"
  # Each key from its own existing 1Password item. Distinct secretKeys avoid the
  # RADARR_API_KEY / SONARR_API_KEY field-name collision across items.
  data:
    - secretKey: radarr_api_key
      remoteRef: { key: radarr, property: RADARR_API_KEY }
    - secretKey: radarr_4k_api_key
      remoteRef: { key: radarr-4k, property: RADARR_API_KEY }
    - secretKey: sonarr_api_key
      remoteRef: { key: sonarr, property: SONARR_API_KEY }
    - secretKey: sonarr_4k_api_key
      remoteRef: { key: sonarr-4k, property: SONARR_API_KEY }
    - secretKey: pushover_user
      remoteRef: { key: pushover, property: PUSHOVER_USER_KEY }
    # Reuses the alertmanager Pushover application token (where it lives). Repoint
    # to a dedicated scanrr token/field later if you want its own Pushover app.
    - secretKey: pushover_token
      remoteRef: { key: alertmanager, property: ALERTMANAGER_PUSHOVER_TOKEN }
