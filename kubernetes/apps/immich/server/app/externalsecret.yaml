---
# Postgres superuser secret — CNPG superuserSecret requires username=postgres
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-superuser
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-db-superuser
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "postgres"
        password: "{{ .IMMICH_POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: immich
---
# App user secret — CNPG managed.roles requires username + password fields
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-user
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-db-user
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "{{ .IMMICH_POSTGRES_USER }}"
        password: "{{ .IMMICH_POSTGRES_PASS }}"
  dataFrom:
    - extract:
        key: immich
---
# App secret — DB and Redis env vars for Immich containers
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-secret
    creationPolicy: Owner
    template:
      data:
        DB_HOSTNAME: "immich-database-rw.immich.svc.cluster.local"
        DB_PORT: "5432"
        DB_DATABASE_NAME: "immich"
        DB_USERNAME: "{{ .IMMICH_POSTGRES_USER }}"
        DB_PASSWORD: "{{ .IMMICH_POSTGRES_PASS }}"
        REDIS_HOSTNAME: "valkey.immich.svc"
        REDIS_PORT: "6379"
  dataFrom:
    - extract:
        key: immich
