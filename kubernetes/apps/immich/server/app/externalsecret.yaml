---
# Postgres superuser secret — CNPG superuserSecret requires username=postgres
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-superuser
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-db-superuser
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: "postgres"
        password: "{{ .IMMICH_POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: immich
---
# App secret — DB env vars and init-db credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-secret
    creationPolicy: Owner
    template:
      data:
        # Immich DB env vars
        DB_HOSTNAME: "immich-database-rw.immich.svc.cluster.local"
        DB_PORT: "5432"
        DB_DATABASE_NAME: "immich"
        DB_USERNAME: "{{ .IMMICH_POSTGRES_USER }}"
        DB_PASSWORD: "{{ .IMMICH_POSTGRES_PASS }}"
        # Redis / Valkey
        REDIS_HOSTNAME: "valkey.immich.svc"
        REDIS_PORT: "6379"
        # Init container vars (superuser for this cluster is IMMICH_POSTGRES_SUPER_PASS)
        INIT_POSTGRES_DBNAME: "immich"
        INIT_POSTGRES_HOST: "immich-database-rw.immich.svc.cluster.local"
        INIT_POSTGRES_USER: "{{ .IMMICH_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .IMMICH_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .IMMICH_POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: immich
