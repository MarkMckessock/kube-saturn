---
# Placeholder ExternalSecret — DB credentials are sourced directly from the
# CNPG-managed immich-database-app secret. This secret can hold additional
# Immich config (e.g., OAuth, SMTP, API keys) in the future.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: immich
