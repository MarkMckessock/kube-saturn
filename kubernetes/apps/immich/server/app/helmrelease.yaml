# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich-server
  namespace: immich
spec:
  chartRef:
    kind: OCIRepository
    name: immich-server
    namespace: immich
  interval: 1h
  driftDetection:
    mode: enabled
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    controllers:
      server:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: immich-secret
            env:
              TZ: America/Chicago
              IMMICH_TELEMETRY_INCLUDE: all
              IMMICH_WORKERS_INCLUDE: api
              IMMICH_MACHINE_LEARNING_URL: http://machine-learning.immich.svc:3003
              MPLCONFIGDIR: /tmp/matplotlib
            securityContext: &securityContext
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: [ALL]}
            ports:
              - name: http
                containerPort: 2283
                protocol: TCP
              - name: metrics-api
                containerPort: 8081
                protocol: TCP
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: http
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/server/ping
                    port: http
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 30

      microservices:
        pod:
          resourceClaims:
            - name: gpu
              resourceClaimTemplateName: immich-server-gpu
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: v2.7.5
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: immich-secret
            env:
              TZ: America/Chicago
              IMMICH_TELEMETRY_INCLUDE: all
              IMMICH_WORKERS_EXCLUDE: api
              IMMICH_MACHINE_LEARNING_URL: http://machine-learning.immich.svc:3003
              MPLCONFIGDIR: /tmp/matplotlib
            securityContext: *securityContext
            resources:
              claims:
                - name: gpu
            ports:
              - name: metrics-ms
                containerPort: 8082
                protocol: TCP

    service:
      main:
        enabled: true
        controller: server
        primary: true
        type: ClusterIP
        ports:
          http:
            enabled: true
            primary: true
            port: 2283
            targetPort: http
            protocol: HTTP
          metrics-api:
            enabled: true
            port: 8081
            targetPort: metrics-api
            protocol: HTTP
      microservices:
        enabled: true
        controller: microservices
        ports:
          metrics-ms:
            enabled: true
            port: 8082
            targetPort: metrics-ms
            protocol: HTTP

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 100Gi
        storageClass: ceph-block
        advancedMounts:
          server:
            main:
              - path: /data
          microservices:
            main:
              - path: /data
      photos:
        type: nfs
        server: granite.markmckessock.com
        path: /volume1/Users/mmckessock/Pictures
        advancedMounts:
          server:
            main:
              - path: /photos
                readOnly: true
          microservices:
            main:
              - path: /photos
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          server:
            main:
              - path: /tmp
          microservices:
            main:
              - path: /tmp

    route:
      app:
        hostnames:
          - immich.markmckessock.com
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: immich-server-main
                port: 2283

    serviceMonitor:
      main:
        enabled: true
        serviceName: main
        endpoints:
          - port: metrics-api
            scheme: http
      microservices:
        enabled: true
        serviceName: microservices
        endpoints:
          - port: metrics-ms
            scheme: http
